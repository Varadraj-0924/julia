    <script src="/theme/js/searchbar.js"></script>
    <script type="text/javascript">
      $(document).ready(function () {
        var params = new URLSearchParams(window.location.search);
        var q = params.get('q');
        var event = params.get('event');
        var speaker = params.get('speaker');
        var language = params.get('language');
        var tag = params.get('tag');

        var displayTerm = [];
        if (q) displayTerm.push('"' + q + '"');
        if (event) displayTerm.push('Event: ' + event);
        if (speaker) displayTerm.push('Speaker: ' + speaker);
        if (language) displayTerm.push('Language: ' + language);
        if (tag) displayTerm.push('Tag: ' + tag);

        if (displayTerm.length === 0) {
          $('#searchTerm').text('All Videos');
        } else {
          $('#searchTerm').text(displayTerm.join(', '));
          if (q) $('.header__searchbox input').val(q);
        }

        $.getJSON('/api/videos' + window.location.search).then(function (data) {
          if (!data || data.length === 0) {
            $('#searchResultContainer').append('<p>No videos found.</p>');
            return;
          }

          var list = $('<div class="content-list">');
          var row = null;

          $.each(data, function (idx, video) {
            if (idx % 4 === 0) {
              if (row) {
                list.append(row);
              }
              row = $('<div class="row" style="margin-bottom: 30px;">');
            }

            var ytIdMatch = video.youtube_url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
            var thumbUrl = ytIdMatch ? 'https://img.youtube.com/vi/' + ytIdMatch[1] + '/hqdefault.jpg' : '/theme/images/julia_logo.svg';

            var videoHtml = '<article class="col-lg-3 col-md-4 col-sm-6" style="margin-bottom: 30px;">' +
              '<div class="video-card" style="background: var(--header-bg); border-radius: 12px; padding-bottom: 15px; height: 100%; border: 1px solid var(--divider); overflow: hidden;">' +
              '<a href="/video.html?id=' + video.id + '">' +
              '<img src="' + thumbUrl + '" class="img-responsive" style="max-height:160px; width:100%; object-fit:cover;" alt="' + video.title + '"/>' +
              '</a>' +
              '<div style="padding: 15px;">' +
              '<h4 class="entry-detail" style="font-size:1.05em; height:45px; overflow:hidden; margin-top:0; font-weight:600;"><a href="/video.html?id=' + video.id + '">' + video.title + '</a></h4>' +
              '<footer class="post-info" style="font-size: 0.9em; color: var(--footer-text);">';
              
            if (video.published_at) {
              var dateStr = new Date(video.published_at).toDateString();
              videoHtml += '<span><i class="fa fa-fw fa-calendar"></i> ' + dateStr + '</span><br/>';
            }

            if (video.event_name) {
              videoHtml += '<div style="margin-top: 5px;"><i class="fa fa-fw fa-list-ul"></i> <a href="/search.html?event=' + encodeURIComponent(video.event_name) + '">' + video.event_name + '</a></div>';
            }

            if (video.speaker_name) {
              videoHtml += '<div style="margin-top: 3px;"><i class="fa fa-fw fa-user"></i> <a href="/search.html?speaker=' + encodeURIComponent(video.speaker_name) + '">' + video.speaker_name + '</a></div>';
            }

            videoHtml += '</footer></div></div></article>';
            row.append($(videoHtml));
          });

          if (row) list.append(row);
          $('#searchResultContainer').empty().append(list);
        });
      });
    </script>
